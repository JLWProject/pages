<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jordan Walker — Projects</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d0d0d;
      color: #e2e2e2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 640px;
      width: 100%;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      margin-bottom: 2.5rem;
    }

    .profile img {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #333;
    }

    .profile-text h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #f0f0f0;
    }

    .profile-text p {
      font-size: 0.875rem;
      color: #888;
      margin-top: 0.2rem;
    }

    .tagline {
      font-size: 0.9375rem;
      color: #555;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .footer {
      font-size: 0.75rem;
      color: #444;
      text-align: center;
    }

    .footer a {
      color: #555;
      text-decoration: none;
    }

    .footer a:hover { color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <div class="profile">
      <img src="jlwproject/jordan_profile_transparent.png" alt="Jordan Walker" />
      <div class="profile-text">
        <h1>Jordan Walker</h1>
      </div>
    </div>

    <p class="tagline">DevOps &amp; Infrastructure Engineer</p>

    <p class="footer">
      <a href="https://github.com/JLWProject" target="_blank" rel="noopener">github.com/JLWProject</a>
    </p>
  </div>
</body>
</html>
